server {
    listen 80;
    server_name _;

    # 允许上传的最大文件大小（图片 + Excel 导入）
    client_max_body_size 20M;

    # 前端静态文件
    location / {
        root /opt/material-management/frontend/dist;
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # 后端 API 代理
    location /api {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookie / Session 透传：告知 Flask 当前协议，避免 secure cookie 在 http 下丢失
        proxy_cookie_path / "/; SameSite=Lax";

        # 超时配置（避免大文件上传、慢查询时 Nginx 先超时报 502/504）
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # 缓冲配置（避免大响应体时的 upstream 错误）
        proxy_buffering on;
        proxy_buffer_size   16k;
        proxy_buffers       8 16k;
        proxy_busy_buffers_size 32k;
    }

    # 静态资源（上传的图片等）
    location /static {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 图片资源可以缓存更长时间
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
